# ============================================================================
# SmartRoadVision — Docker Compose (multi-container stack)
#   app           : FastAPI (gunicorn + uvicorn workers)   :8000
#   dashboard     : Streamlit monitoring dashboard          :8501
#   celery_worker : background video/batch inference
#   postgres      : PostgreSQL 16 + PostGIS 3.4
#   redis         : cache + Celery broker / pub-sub
#   nginx         : reverse proxy  ( / -> dashboard, /api -> app )
# ============================================================================

x-app-env: &app-env
  env_file: .env
  environment:
    POSTGRES_HOST: postgres
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartroad}:${POSTGRES_PASSWORD:-smartroad_secret}@postgres:5432/${POSTGRES_DB:-smartroadvision}

services:
  app:
    build:
      context: .
      target: runtime
    <<: *app-env
    command: >
      gunicorn src.api.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: runtime
    <<: *app-env
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    environment:
      API_BASE_URL: http://app:8000/api/v1
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - app
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      target: runtime
    <<: *app-env
    command: >
      celery -A src.pipeline.batch_pipeline.celery_app
      worker --beat --loglevel=info --concurrency=2
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartroad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartroad_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smartroadvision}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/migrations/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartroad} -d ${POSTGRES_DB:-smartroadvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
      - dashboard
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
